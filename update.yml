name: Actualizar página Mundial 2026

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # también permite correrlo manualmente desde GitHub

jobs:
  regenerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Generar index.html
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python generate.py --api-key "$FOOTBALL_API_KEY"

      - name: Publicar cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Actualización automática $(date +'%Y-%m-%d %H:%M UTC')"
          git push
